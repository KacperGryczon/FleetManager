<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>FleetManager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js" defer></script>
    <script src="register.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/1017934682.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="register">
    <div class="icon-box">
      <i class="fa-solid fa-truck"></i>
    </div>
    <h2>Utwórz konto</h2>
    <p>Rozpocznij zarządanie swoją flotą</p>
    <p id="register_error"></p>

    <div class="register-box">
      <p class="input-label">Email</p>
      <input id="registerEmail" placeholder="twoj@email.pl" />

      <p class="input-label">Hasło</p>
      <input id="registerPassword" type="password" placeholder="!#$%&" />

      <p class="input-label">Powtórz hasło</p>
      <input id="confirmed_password" type="password" placeholder="!#$%&" />

      <button onclick="register()">Utwórz konto</button>

      <div class="login-register">
        <p>Masz już konto?</p>
        <a href="index.html">Zaloguj się</a>
      </div>
    </div>
  </body>
</html>
